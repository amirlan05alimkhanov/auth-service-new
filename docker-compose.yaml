version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_postgres_db
    restart: always
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: auth_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

volumes:
  postgres_auth_data: